name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci*'
      - 'Makefile'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    uses: praetorian-inc/public-workflows/.github/workflows/go-ci.yml@87c0808aa16862a7ffef0cd94c516a02eb48242b  # v2.3.0
    permissions:
      contents: read
    with:
      build-cmd-path: ./cmd/vespasian
      build-binary-name: vespasian
      build-cgo-enabled: "1"
      build-matrix-os: '["linux"]'
      build-matrix-arch: '["amd64"]'
    secrets: inherit
