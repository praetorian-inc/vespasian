name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: praetorian-inc/public-workflows/.github/workflows/go-ci.yml@e7c1f39e9219a3256df321445d558e18cf3027c0  # v2.0.11
    permissions:
      contents: read
    with:
      build-cmd-path: ./cmd/vespasian
      build-binary-name: vespasian
      build-cgo-enabled: "1"
      build-matrix-os: '["linux"]'
      build-matrix-arch: '["amd64"]'
    secrets: inherit
