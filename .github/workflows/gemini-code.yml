name: Gemini PR Assistant

on:
  pull_request:
    types: [opened, ready_for_review]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: gemini-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}  # stray review comments must not cancel an in-progress review

jobs:
  gemini-review:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event_name != 'pull_request_review_comment' || contains(github.event.comment.body, '@gemini'))
    uses: praetorian-inc/public-workflows/.github/workflows/gemini-code.yml@0c602372f3d0d038912dd08e159ecc83954a4995  # v2.9.3
    permissions:
      contents: read
      pull-requests: write
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}