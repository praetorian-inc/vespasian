name: Live Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Fast, un-gated regression self-test for the preflight Chrome/Chromium
  # detection logic (LAB-3893). Independent of the check-label gate, so it runs
  # on every push/PR even when the full suite is skipped via 'skip-live-tests'.
  preflight-selftest:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Syntax check
        run: bash -n test/setup-live-targets.sh

      - name: Run preflight self-test
        run: bash test/preflight-selftest.sh

  # Gate: run by default; skip PR runs only when 'skip-live-tests' label is present.
  # Push-to-main and workflow_dispatch always run.
  check-label:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.gate.outputs.run }}
    steps:
      - id: gate
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'skip-live-tests') }}" == "true" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping live tests — 'skip-live-tests' label is present."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  # Runs all 25 test targets in one job. Offline targets (imports, generates,
  # classifier/spec edge cases) run first so a live-setup failure cannot mask
  # deterministic coverage. Live targets boot services and crawl with Chrome.
  test:
    needs: check-label
    if: needs.check-label.outputs.should-run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      VESPASIAN_NO_SANDBOX: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20

      - name: Build vespasian
        run: go build -o bin/vespasian ./cmd/vespasian

      - name: Write stub config for offline tests
        run: |
          printf '%s\n' \
            "REST_API_PORT=8990" \
            "SOAP_SERVICE_PORT=8991" \
            "GRAPHQL_SERVER_PORT=8992" \
            "CONCAT_SPA_PORT=8993" \
            "TARGETS_SETUP=" \
            > test/.live-test-config

      - name: Run offline tests
        run: |
          ./test/run-live-tests.sh --no-start --no-build \
            --targets import-burp,import-har,import-base64,import-mitmproxy,import-mitmproxy-native,import-unicode,import-duplicates,import-malformed,import-empty,generate-rest,generate-wsdl,generate-wsdl-matrix,generate-graphql,generate-graphql-imports,generate-js-static,generate-merge-slugs,crawl-unreachable,classifier-edge,spec-edge

      - name: Setup live targets
        run: ./test/setup-live-targets.sh

      - name: Run live tests
        run: ./test/run-live-tests.sh --no-build --targets rest-api,soap-service,graphql-server,concat-spa,concat-spa-two-stage,edge-cases,crawl-depth

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: test-results
          path: test/.results/
          retention-days: 7

      - name: Teardown
        if: always()
        run: ./test/setup-live-targets.sh --teardown
