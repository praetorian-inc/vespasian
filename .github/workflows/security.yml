name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly baseline
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    uses: praetorian-inc/public-workflows/.github/workflows/go-security.yml@646324637b20a47d2fcf70623cf1dcafa4880ed3  # v2.0.12
    permissions:
      contents: read
      security-events: write

      actions: read           # required by codeql-action/upload-sarif for run metadata    secrets: inherit
