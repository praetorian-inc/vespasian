name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly baseline
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    uses: praetorian-inc/public-workflows/.github/workflows/go-security.yml@4900fbd3aaf1992181e2ebfb108c71fee8250c67  # v2.0.1
    permissions:
      contents: read
      security-events: write
    secrets: inherit
