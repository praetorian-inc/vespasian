name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci*'
      - 'Makefile'
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly baseline
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    uses: praetorian-inc/public-workflows/.github/workflows/go-sec.yml@0c602372f3d0d038912dd08e159ecc83954a4995  # v2.9.3
    permissions:
      contents: read
      pull-requests: read     # go-sec.yml preflight reads PR files + repo tree
      security-events: write
      actions: read           # required by codeql-action/upload-sarif for run metadata
    with:
      # Skip machine-generated files (those carrying the standard
      # `// Code generated ... DO NOT EDIT.` marker, e.g. test/grpc-server/labpb/*.pb.go).
      # Their unsafe.Pointer fast-paths are protoc-gen-go boilerplate, not
      # hand-written code, so gosec's G103 "audit unsafe" alerts on them are
      # noise. Mirrors golangci-lint's `exclusions.generated: lax`. The rest of
      # the args match the reusable workflow's default (observe-only + SARIF).
      gosec-args: "-no-fail -exclude-generated -fmt sarif -out gosec-results.sarif ./..."
    secrets: inherit
