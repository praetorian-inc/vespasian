name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci*'
      - 'Makefile'
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly baseline
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    uses: praetorian-inc/public-workflows/.github/workflows/go-sec.yml@87c0808aa16862a7ffef0cd94c516a02eb48242b  # v2.3.0
    permissions:
      contents: read
      security-events: write
      actions: read           # required by codeql-action/upload-sarif for run metadata
    secrets: inherit
