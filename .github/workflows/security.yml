name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly baseline
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    uses: praetorian-inc/public-workflows/.github/workflows/go-security.yml@e7c1f39e9219a3256df321445d558e18cf3027c0  # v2.0.11
    permissions:
      contents: read
      security-events: write
    secrets: inherit
