name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci*'
      - 'Makefile'
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly baseline
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    uses: praetorian-inc/public-workflows/.github/workflows/go-sec.yml@7c1302bdef0a72e7f5743738baa45272c8e1f8d7  # v2.1.0
    permissions:
      contents: read
      security-events: write
      actions: read           # required by codeql-action/upload-sarif for run metadata
    secrets: inherit
