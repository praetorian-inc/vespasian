name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly baseline
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    uses: praetorian-inc/public-workflows/.github/workflows/go-security.yml@3dcf34cfbe5e1332d490d28ed1bd119cd86cf81b  # v2.0.13
    permissions:
      contents: read
      security-events: write
      actions: read           # required by codeql-action/upload-sarif for run metadata
    secrets: inherit
