name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly baseline
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    uses: praetorian-inc/public-workflows/.github/workflows/go-security.yml@faa2e42989736cf9b3f47e5377dd5f2e0327517f  # v2.0.2
    permissions:
      contents: read
      security-events: write
    secrets: inherit
