name: CLAUDE.md Drift Detection

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: claude-drift-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  drift-check:
    uses: praetorian-inc/public-workflows/.github/workflows/claude-md-drift.yml@0c602372f3d0d038912dd08e159ecc83954a4995  # v2.9.3
    permissions:
      contents: read
      pull-requests: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
