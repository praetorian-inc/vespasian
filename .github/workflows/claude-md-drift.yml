name: CLAUDE.md Drift Detection

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: claude-drift-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  drift-check:
    uses: praetorian-inc/public-workflows/.github/workflows/claude-md-drift.yml@25c08fbd15a931e275f207ecee1758c931f89ea5  # v2.3.1
    permissions:
      contents: read
      pull-requests: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
