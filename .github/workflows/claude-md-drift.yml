name: CLAUDE.md Drift Detection

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: claude-drift-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  drift-check:
    uses: praetorian-inc/public-workflows/.github/workflows/claude-md-drift.yml@2d4ebcb9a35f353647701eb4caa8ecbd46c32052  # v2.6.4
    permissions:
      contents: read
      pull-requests: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
