name: CLAUDE.md Drift Detection

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: claude-drift-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  drift-check:
    uses: praetorian-inc/public-workflows/.github/workflows/claude-md-drift.yml@5bee862b5576ede0c17b22aac4a23de5a43f31fc  # v2.6.5
    permissions:
      contents: read
      pull-requests: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
