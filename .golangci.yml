version: "2"
linters:
  enable:
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - revive
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocyclo:
      min-complexity: 15
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocyclo
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/praetorian-inc/vespasian
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
