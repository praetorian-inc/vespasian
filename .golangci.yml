version: "2"
linters:
  enable:
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - revive
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocyclo:
      min-complexity: 15
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocyclo
      # staticcheck SA5011 (possible nil deref) is a false positive in tests
      # that guard with `if x == nil { t.Fatal(...) }` before dereferencing:
      # t.Fatal terminates the test, so the deref is never reached with nil.
      # Excluded in _test.go only; production nil-deref checks stay enforced.
      - path: _test\.go
        text: SA5011
        linters:
          - staticcheck
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/praetorian-inc/vespasian
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
